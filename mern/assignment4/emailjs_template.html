<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7f9; padding: 30px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="500" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; overflow:hidden; font-family: Arial, sans-serif;">

        <!-- Header -->
        <tr>
          <td style="background-color:#4aa0e6; padding: 24px 30px;">
            <h1 style="margin:0; color:#ffffff; font-size:20px;">New Laundry Booking Received</h1>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding: 30px;">
            <p style="margin:0 0 20px; color:#333333; font-size:14px; line-height:1.6;">
              A new booking has been placed on Laundry Mart. Details below:
            </p>

            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse; margin-bottom: 20px;">
              <tr>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#888888; font-size:13px; width:140px;">Customer Name</td>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#333333; font-size:14px; font-weight:bold;">{{from_name}}</td>
              </tr>
              <tr>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#888888; font-size:13px;">Email</td>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#333333; font-size:14px;">{{user_email}}</td>
              </tr>
              <tr>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#888888; font-size:13px;">Phone</td>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#333333; font-size:14px;">{{phone_number}}</td>
              </tr>
              <tr>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#888888; font-size:13px; vertical-align:top;">Services</td>
                <td style="padding:10px 0; border-bottom:1px solid #eeeeee; color:#333333; font-size:14px;">{{services}}</td>
              </tr>
            </table>

            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#eaf4fc; border-radius:8px;">
              <tr>
                <td style="padding: 16px 20px;">
                  <span style="color:#4aa0e6; font-size:13px;">Total Amount</span><br>
                  <span style="color:#333333; font-size:22px; font-weight:bold;">{{total_amount}}</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background-color:#f4f7f9; padding: 16px 30px; text-align:center;">
            <p style="margin:0; color:#999999; font-size:12px;">Laundry Mart — Automated booking notification</p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
