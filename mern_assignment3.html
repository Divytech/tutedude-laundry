<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 40px;
            color: #222;
        }

        .box-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .box {
            width: 120px;
            height: 120px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            background-color: #fff;
            color: #333;
            user-select: none;
        }

        .input-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input {
            padding: 12px 20px;
            font-size: 1.1rem;
            border: 2px solid #aaa;
            border-radius: 6px;
            outline: none;
            width: 250px;
        }

        input:focus {
            border-color: #555;
        }

        button {
            padding: 12px 28px;
            font-size: 1.1rem;
            background-color: #888;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1 id="greeting">Hello</h1>

    <div class="box-container">
        <div class="box" id="red">Red</div>
        <div class="box" id="blue">Blue</div>
        <div class="box" id="green">Green</div>
        <div class="box" id="yellow">Yellow</div>
    </div>

    <div class="input-section">
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button id="greetBtn">Greet</button>
    </div>

    <script>
        var greeting = document.getElementById("greeting");
        var nameInput = document.getElementById("nameInput");
        var greetBtn = document.getElementById("greetBtn");

        var redBox = document.getElementById("red");
        var blueBox = document.getElementById("blue");
        var greenBox = document.getElementById("green");
        var yellowBox = document.getElementById("yellow");

        greetBtn.addEventListener("click", function () {
            var name = nameInput.value.trim();
            if (name) {
                greeting.textContent = "Hello, " + name;
            }
        });

        redBox.addEventListener("click", function () {
            redBox.style.backgroundColor = "red";
            redBox.style.color = "#fff";
        });

        blueBox.addEventListener("click", function () {
            blueBox.style.backgroundColor = "blue";
            blueBox.style.color = "#fff";
        });

        greenBox.addEventListener("click", function () {
            greenBox.style.backgroundColor = "green";
            greenBox.style.color = "#fff";
        });

        yellowBox.addEventListener("click", function () {
            yellowBox.style.backgroundColor = "yellow";
            yellowBox.style.color = "#333";
        });
    </script>

</body>
</html>
